<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topoloco — topographic prints from any point on Earth</title>
    <meta
      name="description"
      content="Drop a GPS point anywhere on Earth and get a topographic art print with a custom colormap."
    />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <header>
          <h1>TOPOLOCO</h1>
          <p class="tagline">Topographic prints from any point on Earth.</p>
        </header>

        <section>
          <h2>Location</h2>
          <div class="search-wrap">
            <input id="search" type="text" placeholder="Search a place… (Enter)" autocomplete="off" />
            <ul id="search-results" hidden></ul>
          </div>
          <div id="minimap"></div>
          <div class="row">
            <label>Lat <input id="lat" type="number" step="0.0001" min="-85" max="85" /></label>
            <label>Lon <input id="lon" type="number" step="0.0001" min="-180" max="180" /></label>
          </div>
          <label class="full">Title <input id="title" type="text" placeholder="Print title" /></label>
        </section>

        <section>
          <h2>Style</h2>
          <div class="row">
            <label>Extent
              <select id="extent">
                <option value="5">5 km</option>
                <option value="10">10 km</option>
                <option value="20" selected>20 km</option>
                <option value="40">40 km</option>
                <option value="80">80 km</option>
                <option value="160">160 km</option>
              </select>
            </label>
            <span class="hint">map width at this point</span>
          </div>
          <label class="row slider" title="How many elevation bands the colormap is split into — fewer for bold posters, more for fine detail">
            Contour bands
            <input id="bands" type="range" min="6" max="32" value="18" />
            <span id="bands-value">18</span>
          </label>
          <div class="row" id="aspect-row">
            <button data-aspect="square" class="aspect selected">Square</button>
            <button data-aspect="portrait" class="aspect">Portrait</button>
            <button data-aspect="landscape" class="aspect">Landscape</button>
          </div>
          <div id="palettes"></div>
          <div class="row">
            <button id="shuffle" title="Random complementary pair">🎲 Shuffle palette</button>
            <label class="swatch">A <input id="colorA" type="color" /></label>
            <label class="swatch">B <input id="colorB" type="color" /></label>
          </div>
          <div class="row checks">
            <label><input id="quantile" type="checkbox" /> Quantile colors</label>
            <label><input id="reverse" type="checkbox" /> Reverse</label>
          </div>
        </section>

        <section>
          <h2>Export</h2>
          <div class="row">
            <label>Print size
              <select id="print-size">
                <option value="8">8 in</option>
                <option value="12" selected>12 in</option>
                <option value="16">16 in</option>
                <option value="24">24 in</option>
              </select>
            </label>
            <span class="hint">@ 300 DPI</span>
          </div>
          <div class="row wrap">
            <button id="animate">▶ Animate</button>
            <button id="dl-png">PNG</button>
            <button id="dl-svg">SVG</button>
            <button id="dl-gif">GIF</button>
            <button id="share">Copy link</button>
          </div>
        </section>

        <section>
          <h2>Gallery</h2>
          <div id="gallery" class="row wrap"></div>
        </section>

        <div id="status"></div>

        <p class="footer-links">
          <a href="https://cerv.one/essays/topoloco.html" target="_blank" rel="noopener">Why I built this</a> ·
          <a href="https://github.com/ccerv1/topoloco" target="_blank" rel="noopener">GitHub</a>
        </p>
        <p class="credits">
          Elevation: <a href="https://registry.opendata.aws/terrain-tiles/" target="_blank" rel="noopener">Terrain Tiles</a> (NASA SRTM et al.) ·
          Geocoding &amp; map: <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">© OpenStreetMap</a>
        </p>
      </aside>

      <main id="stage">
        <canvas id="print"></canvas>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
